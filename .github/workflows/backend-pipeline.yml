name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-pipeline:
    name: Backend Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 01 - Commit Message
        run: echo "Schritt Commit Message ist erreicht"

      - name: 02 - Branch Protection
        run: echo "Schritt Branch Protection ist erreicht"

      - name: 03 - Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 03 - Dependencies
        run: |
          echo "Schritt Dependencies ist erreicht"

          echo "::group::Install dependencies"
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "::endgroup::"

          echo "::group::Check FastAPI"
          python -c "import fastapi; print('FastAPI version:', fastapi.__version__)"
          echo "::endgroup::"

      - name: 04 - Format
        run: |
          echo "Schritt Format ist erreicht"

          echo "::group::Run Ruff formatter check"
          python -m ruff format --check --diff .
          echo "::endgroup::"

      - name: 05 - Linting
        run: |
          echo "Schritt Linting ist erreicht"

          echo "::group::Run Ruff linting check"
          python -m ruff check .
          echo "::endgroup::"

      - name: 06 - Typecheck
        run: |
          echo "Schritt Typecheck ist erreicht"

          echo "::group::Run mypy type check"
          python -m mypy app
          echo "::endgroup::"

      - name: 07 - Tests
        run: |
          echo "Schritt Tests ist erreicht"

          echo "::group::Run pytest API tests"
          python -m pytest tests -v
          echo "::endgroup::"

      - name: 08 - Coverage
        run: echo "Schritt Coverage ist erreicht"

      - name: 09 - Integration Tests
        run: echo "Schritt Integration Tests ist erreicht"

      - name: 10 - API Contract
        run: echo "Schritt API Contract ist erreicht"

      - name: 11 - Migration Check
        run: echo "Schritt Migration Check ist erreicht"

      - name: 12 - Security Scan
        run: echo "Schritt Security Scan ist erreicht"

      - name: 13 - Docker Build
        run: echo "Schritt Docker Build ist erreicht"

      - name: 14 - Deploy Staging
        run: echo "Schritt Deploy Staging ist erreicht"

      - name: 15 - Deploy Production
        run: echo "Schritt Deploy Production ist erreicht"