name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-pipeline:
    name: Backend Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 01 - Commit Message
        run: echo "Schritt Commit Message ist erreicht"

      - name: 02 - Branch Protection
        run: echo "Schritt Branch Protection ist erreicht"

      - name: 03 - Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 03 - Dependencies
        run: |
          echo "Schritt Dependencies ist erreicht"

          echo "::group::Install dependencies"
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "::endgroup::"

          echo "::group::Check FastAPI"
          python -c "import fastapi; print('FastAPI version:', fastapi.__version__)"
          echo "::endgroup::"

      - name: 04 - Format
        run: |
          echo "Schritt Format ist erreicht"

          echo "::group::Run Ruff formatter check"
          python -m ruff format --check --diff .
          echo "::endgroup::"

      - name: 05 - Linting
        run: |
          echo "Schritt Linting ist erreicht"

          echo "::group::Run Ruff linting check"
          python -m ruff check .
          echo "::endgroup::"

      - name: 06 - Typecheck
        run: |
          echo "Schritt Typecheck ist erreicht"

          echo "::group::Run mypy type check"
          python -m mypy app
          echo "::endgroup::"

      - name: 07 - Tests
        run: |
          echo "Schritt (Unit) Tests ist erreicht"

          echo "::group::Run pytest API tests"
          python -m pytest tests -v
          echo "::endgroup::"

      - name: 08 - Coverage
        run: |
          echo "Schritt Coverage ist erreicht"

          echo "::group::Run pytest with coverage"
          python -m pytest tests -v --cov=app --cov-report=term-missing --cov-report=xml
          echo "::endgroup::"

          echo "::group::Check coverage report file"
          test -f coverage.xml
          echo "coverage.xml was created successfully"
          echo "::endgroup::"

      - name: 09 - Integration Tests
        run: |
          echo "Schritt Integration Tests ist erreicht"

          echo "::group::Start FastAPI app"
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          APP_PID=$!
          trap "kill $APP_PID" EXIT
          echo "Started app with PID $APP_PID"
          echo "::endgroup::"

          echo "::group::Wait for app to become available"
          for i in {1..10}; do
            if curl -fsS http://127.0.0.1:8000/docs > /dev/null; then
              echo "App is available"
              break
            fi

            echo "Waiting for app..."
            sleep 1
          done
          echo "::endgroup::"

          echo "::group::Run integration tests"
          python -m pytest integration_tests -v
          echo "::endgroup::"

      - name: 10 - API Contract
        run: |
          echo "Schritt API Contract ist erreicht"

          echo "::group::Run OpenAPI contract tests"
          python -m pytest contract_tests -v
          echo "::endgroup::"

      - name: 11 - Migration Check
        run: |
          echo "Schritt Migration Check ist erreicht"
          echo "Aktuell sind keine Datenbankmigrationen eingerichtet."
          echo "Der Migration Check bleibt deshalb vorerst ein organisatorischer Platzhalter."

      - name: 12 - Security Scan
        run: |
          echo "Schritt Security Scan ist erreicht"

          echo "::group::Run Bandit static security scan"
          python -m bandit -r app scripts -ll -ii
          echo "::endgroup::"

          echo "::group::Run pip-audit dependency vulnerability scan"
          pip-audit --ignore-vuln CVE-2025-3000
          echo "::endgroup::"

      - name: 13 - Docker Build
        run: |
          echo "Schritt Docker Build ist erreicht"

          echo "::group::Build Docker image"
          docker build -t audioexplorer-api:${{ github.sha }} .
          echo "::endgroup::"

          echo "::group::Inspect Docker image"
          docker image inspect audioexplorer-api:${{ github.sha }}
          echo "::endgroup::"

          echo "::group::Save Docker image as artifact file"
          docker save audioexplorer-api:${{ github.sha }} | gzip > audioexplorer-api-image.tar.gz
          ls -lh audioexplorer-api-image.tar.gz
          echo "::endgroup::"

      - name: 14 - Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: audioexplorer-api-image-${{ github.sha }}
          path: audioexplorer-api-image.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: 15 - Deploy Staging
        run: echo "Schritt Deploy Staging ist erreicht"

      - name: 16 - Deploy Production
        run: echo "Schritt Deploy Production ist erreicht"